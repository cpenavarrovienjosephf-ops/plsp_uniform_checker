version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: plsp_uniform
      POSTGRES_USER: plsp
      POSTGRES_PASSWORD: plsp_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plsp -d plsp_uniform"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://plsp:plsp_secret@db:5432/plsp_uniform
      JWT_SECRET: plsp-uniform-checker-super-secret-key-2025
      PORT: "5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
